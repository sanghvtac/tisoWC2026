name: Tu dong lay ti so WC2026

# Robot tự lấy tỉ số vòng bảng từ openfootball, ghi vào Firebase.
# Chạy theo lịch (giờ UTC). Vì GitHub Actions có thể trễ 5-30 phút nên
# ta chạy thường xuyên (mỗi 15 phút) trong khoảng giờ các trận hay diễn ra.

on:
  schedule:
    # Mỗi 15 phút. (GitHub dùng giờ UTC; VN = UTC+7.)
    # Chạy cả ngày cho chắc — lấy tỉ số là việc nhẹ, không tốn kém.
    - cron: '*/15 * * * *'
  workflow_dispatch:   # cho phép bấm chạy tay để test

# Tránh nhiều lần chạy chồng nhau
concurrency:
  group: fetch-scores
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Chay robot lay ti so
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SECRET }}
        run: python fetch_scores.py
