name: Tu dong lay ti so WC2026

# Robot tự lấy tỉ số vòng bảng từ openfootball, ghi vào Firebase.
# Chạy theo lịch (giờ UTC). Vì GitHub Actions có thể trễ 5-30 phút nên
# ta chạy thường xuyên (mỗi 15 phút) trong khoảng giờ các trận hay diễn ra.

on:
  schedule:
    # Mỗi 15 phút, CHỈ trong khung 0h–8h sáng giờ Việt Nam.
    # LƯU Ý: GitHub Actions chạy theo giờ UTC. Việt Nam = UTC+7.
    #   VN 00:00  =  UTC 17:00 (hôm trước)
    #   VN 08:00  =  UTC 01:00
    # => khung VN 0h–8h tương ứng UTC 17h–1h (vắt qua nửa đêm UTC):
    #    các giờ UTC: 17,18,19,20,21,22,23, 0  (= VN 0h00–7h59)
    - cron: '*/15 17-23,0 * * *'
  workflow_dispatch:   # cho phép bấm chạy tay bất cứ lúc nào để test/lấy ngay

# Tránh nhiều lần chạy chồng nhau
concurrency:
  group: fetch-scores
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Chay robot lay ti so
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SECRET }}
        run: python fetch_scores.py
